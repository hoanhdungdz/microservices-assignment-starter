services:
  user-service:
    build:
      context: ./services/user-service
    container_name: user-service
    environment:
      USER_DB_PATH: /data/user.db
    volumes:
      - user-service-data:/data
    ports:
      - "8001:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  restaurant-service:
    build:
      context: ./services/restaurant-service
    container_name: restaurant-service
    environment:
      RESTAURANT_DB_PATH: /data/restaurant.db
    volumes:
      - restaurant-service-data:/data
    ports:
      - "8002:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  menu-service:
    build:
      context: ./services/menu-service
    container_name: menu-service
    environment:
      MENU_DB_PATH: /data/menu.db
    volumes:
      - menu-service-data:/data
    ports:
      - "8003:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  order-service:
    build:
      context: ./services/order-service
    container_name: order-service
    environment:
      ORDER_DB_PATH: /data/order.db
      RESTAURANT_SERVICE_URL: http://restaurant-service:8000
    volumes:
      - order-service-data:/data
    ports:
      - "8004:8000"
    depends_on:
      restaurant-service:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
    container_name: frontend

  gateway:
    build:
      context: ./gateway
    container_name: gateway
    ports:
      - "8000:8000"
    depends_on:
      user-service:
        condition: service_healthy
      restaurant-service:
        condition: service_healthy
      menu-service:
        condition: service_healthy
      order-service:
        condition: service_healthy
      frontend:
        condition: service_started

volumes:
  user-service-data:
  restaurant-service-data:
  menu-service-data:
  order-service-data:
