events {}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  server {
    listen 8000;
    server_name _;

    location = /health {
      default_type application/json;
      return 200 '{"status": "ok"}';
    }

    # user-service (required direct routes)
    location /users {
      proxy_pass http://user-service:8000;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # restaurant-service (required direct routes)
    location /restaurants {
      proxy_pass http://restaurant-service:8000;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # menu-service (required direct routes)
    location /menus {
      proxy_pass http://menu-service:8000;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # order-service (required direct routes)
    location /orders {
      proxy_pass http://order-service:8000;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Backward-compatible API prefix routing for existing frontend
    location /api/users {
      rewrite ^/api/(.*)$ /$1 break;
      proxy_pass http://user-service:8000;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/auth {
      rewrite ^/api/(.*)$ /$1 break;
      proxy_pass http://user-service:8000;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/restaurants {
      rewrite ^/api/(.*)$ /$1 break;
      proxy_pass http://restaurant-service:8000;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/orders {
      rewrite ^/api/(.*)$ /$1 break;
      proxy_pass http://order-service:8000;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Legacy endpoint used by frontend: /api/restaurants/{id}/menu -> /menus?restaurant_id={id}
    location ~ ^/api/restaurants/([^/]+)/menu$ {
      proxy_pass http://menu-service:8000/menus?restaurant_id=$1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Legacy endpoint compatibility for manager dashboard
    location = /api/menu-items {
      proxy_pass http://menu-service:8000/menus;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location ~ ^/api/menu-items/([^/]+)/availability$ {
      proxy_pass http://menu-service:8000/menus/$1/availability;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location ~ ^/api/menu-items/([^/]+)$ {
      proxy_pass http://menu-service:8000/menus/$1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location / {
      proxy_pass http://frontend:3000;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
