openapi: 3.0.3
info:
  title: Menu Service API
  version: 1.0.0
servers:
  - url: http://localhost:8003
paths:
  /health:
    get:
      summary: Health check
      responses:
        "200":
          description: OK
  /menus:
    get:
      summary: List menu items
      parameters:
        - in: query
          name: restaurant_id
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Menu list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MenuItem"
    post:
      summary: Create menu item
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MenuItemCreate"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MenuItem"
  /menus/{menu_item_id}:
    get:
      summary: Get menu item by id
      parameters:
        - in: path
          name: menu_item_id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Menu item details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MenuItem"
        "404":
          description: Menu item not found
    patch:
      summary: Update menu item
      parameters:
        - in: path
          name: menu_item_id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MenuItemUpdate"
      responses:
        "200":
          description: Updated menu item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MenuItem"
        "404":
          description: Menu item not found
  /menus/{menu_item_id}/availability:
    patch:
      summary: Update menu item availability
      parameters:
        - in: path
          name: menu_item_id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [available]
              properties:
                available:
                  type: boolean
      responses:
        "200":
          description: Updated menu item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MenuItem"
        "404":
          description: Menu item not found
components:
  schemas:
    MenuItemCreate:
      type: object
      required: [restaurant_id, name, description, price]
      properties:
        restaurant_id:
          type: string
        name:
          type: string
        description:
          type: string
        price:
          type: number
          format: float
        category:
          type: string
        image_url:
          type: string
          nullable: true
    MenuItemUpdate:
      type: object
      required: [name, description, price, category]
      properties:
        name:
          type: string
        description:
          type: string
        price:
          type: number
          format: float
        category:
          type: string
        image_url:
          type: string
          nullable: true
    MenuItem:
      allOf:
        - $ref: "#/components/schemas/MenuItemCreate"
        - type: object
          required: [id, available, created_at]
          properties:
            id:
              type: string
            available:
              type: boolean
            created_at:
              type: string
