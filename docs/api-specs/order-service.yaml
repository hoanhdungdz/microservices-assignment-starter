openapi: 3.0.3
info:
  title: Order Service API
  version: 1.0.0
servers:
  - url: http://localhost:8004
paths:
  /health:
    get:
      summary: Health check
      responses:
        "200":
          description: OK
  /orders:
    get:
      summary: List orders
      parameters:
        - in: query
          name: user_phone
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Order list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OrderListItem"
    post:
      summary: Create order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderCreate"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "400":
          description: Business validation error
  /orders/{order_id}:
    get:
      summary: Get order by id
      parameters:
        - in: path
          name: order_id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Order details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "404":
          description: Order not found
    delete:
      summary: Cancel order (only if PENDING)
      parameters:
        - in: path
          name: order_id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Cancelled
        "400":
          description: Cannot cancel
        "404":
          description: Order not found
  /orders/{order_id}/status:
    patch:
      summary: Update order status
      parameters:
        - in: path
          name: order_id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderStatusUpdate"
      responses:
        "200":
          description: Updated order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "400":
          description: Invalid status or transition
        "404":
          description: Order not found
components:
  schemas:
    OrderItemCreate:
      type: object
      required: [menu_item_id, menu_item_name, quantity, unit_price]
      properties:
        menu_item_id:
          type: string
        menu_item_name:
          type: string
        quantity:
          type: integer
          minimum: 1
        unit_price:
          type: number
          format: float
          minimum: 0
    OrderCreate:
      type: object
      required: [user_name, user_phone, restaurant_id, delivery_address, items]
      properties:
        user_name:
          type: string
        user_phone:
          type: string
        restaurant_id:
          type: string
        delivery_address:
          type: string
        note:
          type: string
          nullable: true
        items:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/OrderItemCreate"
    OrderItem:
      allOf:
        - $ref: "#/components/schemas/OrderItemCreate"
        - type: object
          required: [id, order_id]
          properties:
            id:
              type: string
            order_id:
              type: string
    Order:
      type: object
      required:
        - id
        - user_name
        - user_phone
        - restaurant_id
        - delivery_address
        - status
        - total_price
        - created_at
        - updated_at
        - items
      properties:
        id:
          type: string
        user_name:
          type: string
        user_phone:
          type: string
        restaurant_id:
          type: string
        delivery_address:
          type: string
        status:
          type: string
          enum:
            [PENDING, CONFIRMED, PREPARING, DELIVERING, DELIVERED, CANCELLED]
        total_price:
          type: number
          format: float
        note:
          type: string
          nullable: true
        created_at:
          type: string
        updated_at:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"
    OrderListItem:
      type: object
      required:
        [
          id,
          user_name,
          user_phone,
          restaurant_id,
          delivery_address,
          status,
          total_price,
          created_at,
          updated_at,
        ]
      properties:
        id:
          type: string
        user_name:
          type: string
        user_phone:
          type: string
        restaurant_id:
          type: string
        delivery_address:
          type: string
        status:
          type: string
        total_price:
          type: number
          format: float
        note:
          type: string
          nullable: true
        created_at:
          type: string
        updated_at:
          type: string
    OrderStatusUpdate:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum:
            [PENDING, CONFIRMED, PREPARING, DELIVERING, DELIVERED, CANCELLED]
