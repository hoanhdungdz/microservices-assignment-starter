<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FastBite Delivery</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600;700;800&family=Inter:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand" id="nav-home">
        <span class="brand-mark">FastBite</span>
        <span class="brand-sub">delivery</span>
      </div>
      <nav class="nav-actions" id="nav-actions">
        <button id="go-auth" class="btn btn-outline">Đăng Nhập</button>
        <button id="go-profile" class="btn btn-outline">Hồ Sơ</button>
        <button id="go-checkout" class="btn btn-outline">Giỏ Hàng</button>
        <button id="go-tracking" class="btn btn-outline">Theo Dõi Đơn</button>
      </nav>
    </header>

    <main class="container">
      <div id="flash" class="flash hidden"></div>
      <div id="app"></div>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
